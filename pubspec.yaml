  url_launcher: ^6.1.10
  flutter_animate: ^4.0.0
  lottie: ^3.3.3
  google_fonts: ^8.1.0
  flutter_custom_tabs: ^2.5.0
  crypto: ^3.0.7
  flutter_svg: ^2.3.0
  google_sign_in: 6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
