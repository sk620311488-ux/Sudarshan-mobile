name: sudarshan_mobile
description: Mobile-first Sudarshan learning app scaffold.
publish_to: "none"
version: 1.0.2+4

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  firebase_core: ^4.6.0
  firebase_database: ^12.2.0
  flutter_local_notifications: ^22.0.1
  http: ^1.2.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  share_plus: ^13.1.0
  speech_to_text: ^7.0.0
  pdf: ^3.11.0
  printing: ^5.13.0
